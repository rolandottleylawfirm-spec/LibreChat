# LibreChat Configuration — The Ottley Law Firm
version: 1.1.5

cache: true

# ── Interface ─────────────────────────────────────────────────────────────────
interface:
  appTitle: "TOLF Legal AI"
  appDescription: "The Ottley Law Firm — Confidential Legal Research Platform"
  agents: true
  showToolCalls: true
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true

# ── Registration ──────────────────────────────────────────────────────────────
registration:
  socialLogins: []
  allowedDomains:
    - "theottleylawfirm.com"
    - "tolfpc.com"

# ── AI Endpoints ──────────────────────────────────────────────────────────────
endpoints:
  agents:
    disableBuilder: false
    recursionLimit: 25

  bedrock:
    availableRegions:
      - us-east-1
    titleModel: "us.anthropic.claude-sonnet-4-6"
    streamRate: 35

# ── MCP Servers ───────────────────────────────────────────────────────────────
mcpServers:
  tolf-legal-tools:
    type: sse
    url: "${MCP_SERVER_URL}/sse"
    timeout: 30000
    initTimeout: 15000
