version: 1.3.8

cache: true

interface:
  appTitle: "TOLF Legal AI"
  appDescription: "The Ottley Law Firm — Confidential Legal Research Platform"
  agents: true
  showToolCalls: true
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true

registration:
  socialLogins: []
  allowedDomains:
    - "theottleylawfirm.com"
    - "tolfpc.com"

endpoints:
  agents:
    disableBuilder: false
    recursionLimit: 25

  bedrock:
    availableRegions:
      - us-east-1
    titleModel: "us.anthropic.claude-sonnet-4-6"
    streamRate: 35

mcpServers:
  tolf-legal-tools:
    type: streamable-http
    url: "${MCP_SERVER_URL}/mcp"
    timeout: 60000
    initTimeout: 30000
